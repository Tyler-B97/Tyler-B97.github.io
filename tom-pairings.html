<script>
    document.querySelectorAll(".toggleButton").forEach(button => { 
        button.addEventListener("click", function() {
            let tables = document.querySelectorAll(".players_table");
            let showOnlyMatching = this.dataset.showOnlyMatching === "true";
    
            tables.forEach(table => {
                let rows = table.querySelectorAll("tbody tr");
                rows.forEach(row => {
                    if (!row.classList.contains("static-seat")) {
                        row.style.display = showOnlyMatching ? "" : "none";
                    }
                });
            });
        
            // Update buttons state
            document.querySelectorAll(".toggleButton").forEach(btn => { 
                btn.dataset.showOnlyMatching = showOnlyMatching ? "false" : "true";
                btn.textContent = showOnlyMatching ? "Show only players with a static seat" : "Show all players";
            });
        });
    });
